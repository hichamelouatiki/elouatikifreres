name: Deploy to Hostinger
# Ce script se déclenche à chaque fois que vous faites un "push" sur la branche "main"
on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Évite l’avertissement Node 20 déprécié : exécute les actions JS sur Node 24
    # https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v6

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🧹 Clean previous static export
        run: rm -rf out

      - name: 🏗️ Build static site
        run: npm run build
        env:
          NEXT_PUBLIC_WEB3FORMS_ACCESS_KEY: ${{ secrets.NEXT_PUBLIC_WEB3FORMS_ACCESS_KEY }}

      - name: 📂 Sync Out folder to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # On prend tout ce qui est DANS ton dossier out local
          local-dir: ./out/
          # Chemin exact vu sur ton FileZilla
          server-dir: /domains/elouatikifreres.com/public_html/
          # On ne supprime pas les fichiers distants pour éviter les erreurs de droits
          dangerous-clean-slate: false
          # Utilise FTPS pour chiffrer les identifiants et le transfert.
          protocol: ftps
          # Hostinger peut fermer lentement le canal de contrôle pendant une synchro complète
          timeout: 120000
